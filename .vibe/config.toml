[[mcp_servers]]
name = "laravel-boost"
transport = "stdio"
command = "php"
args = [
    "artisan",
    "boost:mcp",
]

[tools.write_file]
permission = "always"

[tools.edit]
permission = "always"

[tools.bash]
allowlist = [
    "cd",
    "composer types:check",
    "echo",
    "find",
    "git status",
    "head",
    "ls",
    "mkdir",
    "php",
    "tail",
    "vendor/bin/pint",
]

[tools.read]
allowlist = [
    "/Users/lucienculot/.vibe/plans/*",
]
